name: Build
on: [push]
jobs:
  build_app:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v3

      - name: Install prerequisites
        run: sudo apt-get install -qy --no-install-recommends libconfig++-dev libmicrohttpd-dev

      - name: Install paho for C
        run: |
          git clone https://github.com/eclipse/paho.mqtt.c.git
          cd paho.mqtt.c
          git checkout v1.3.8
          cmake -Bbuild -H. -DPAHO_ENABLE_TESTING=OFF -DPAHO_BUILD_STATIC=ON -DPAHO_WITH_SSL=ON -DPAHO_HIGH_PERFORMANCE=ON
          sudo cmake --build build/ --target install
          sudo ldconfig

      - name: Install paho for C++
        run: |
          git clone https://github.com/eclipse/paho.mqtt.cpp
          cd paho.mqtt.cpp
          cmake -Bbuild -H. -DPAHO_BUILD_STATIC=ON
          sudo cmake --build build/ --target install
          sudo ldconfig

      - name: Build application
        run: |
          mkdir build
          cd build
          cmake ..
          make

  build_docker:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push docker image
        run: |
          docker build . --tag ghcr.io/falste/smarthome:latest
          docker run ghcr.io/falste/smarthome:latest
          docker push ghcr.io/falste/smarthome:latest
